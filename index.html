<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Tip calculator app</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>

  <main>
    <img src="./images/logo.svg" alt="Splitter">
    
    <div>
      <form id="tip-form">
        <label for="bill">Bill</label>
        <input 
        type="number" 
        id="bill" 
        name="bill" 
        required
        >

        <fieldset>
          <legend>Select Tip %</legend>

          <label>
            <input type="radio" name="tip" value="5">
            5%
          </label>

          <label>
            <input type="radio" name="tip" value="10">
            10%
          </label>

          <label>
            <input type="radio" name="tip" value="15">
            15%
          </label>

          <label>
            <input type="radio" name="tip" value="25">
            25%
          </label>

          <label>
            <input type="radio" name="tip" value="50">
            50%
          </label>

          <input
          type="number"
          name="tip-custom"
          placeholder="Custom"
          aria-label="Custom tip percentage"
          min="0"
          step="1"
          >
        </fieldset>

        <label for="num-people">Number of People</label>
        <input 
        type="number" 
        id="num-people" 
        name="num-people" 
        min="1"
        required
        >
      </form>
      <div>
        <div>
          <p>
            Tip Amount
            <span>/ person</span>
          </p>

          <output id="tip-amount" aria-live="polite"></output>

        </div>
        <div>
          <p>
            Total
            <span>/ person</span>
          </p>

          <output id="total" aria-live="polite"></output>

        </div>
        <button type="reset" form="tip-form">Reset</button>
      </div>
    </div>
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
