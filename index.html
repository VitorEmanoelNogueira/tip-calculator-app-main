<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Tip calculator app</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&family=Rubik:ital,wght@0,300..900;1,300..900&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="./css/normalize.css">
  <link rel="stylesheet" href="./css/styles.css">
  <link rel="stylesheet" href="./css/media-query.css">
  <script src="./js/main.js" defer></script>
  
</head>
<body>

  <main class="l-main">
    <img src="./images/logo.svg" alt="Splitter" class="logo">
    
    <div class="c-bill-splitter o-surface o-surface--lg">
      <form id="tip-form" class="c-bill-splitter__form" novalidate>
        <label for="bill" class="c-bill-splitter__field-label">Bill</label>
        <input 
        class="c-bill-splitter__input o-surface o-surface--neutral u-input-icon u-input-icon--money"
        type="number" 
        id="bill" 
        name="bill" 
        placeholder="0"
        min="0"
        step="0.01"
        required
        >

        <fieldset class="c-bill-splitter__tip-field">
          <legend class="c-bill-splitter__field-label">Select Tip %</legend>

          <label class="c-bill-splitter__tip-button o-surface o-surface--strong">
            <input type="radio" name="tip" value="5">
            5%
          </label>

          <label class="c-bill-splitter__tip-button o-surface o-surface--strong">
            <input type="radio" name="tip" value="10">
            10%
          </label>

          <label class="c-bill-splitter__tip-button o-surface o-surface--strong">
            <input type="radio" name="tip" value="15">
            15%
          </label>

          <label class="c-bill-splitter__tip-button o-surface o-surface--strong">
            <input type="radio" name="tip" value="25">
            25%
          </label>

          <label class="c-bill-splitter__tip-button o-surface o-surface--strong">
            <input type="radio" name="tip" value="50">
            50%
          </label> 

          <input 
          class="c-bill-splitter__input c-bill-splitter__input--custom o-surface o-surface--neutral"
          type="number"
          name="tip-custom"
          placeholder="Custom"
          aria-label="Custom tip percentage"
          min="0"
          step="1"
          >
        </fieldset>

        <div class="c-bill-splitter__field-header">
          <label for="num-people" class="c-bill-splitter__field-label">Number of People</label>
          <span class="c-bill-splitter__error c-bill-splitter__error--num-people" aria-live="polite"></span>
        </div>
        <input 
        class="c-bill-splitter__input o-surface o-surface--neutral u-input-icon u-input-icon--person"
        type="number" 
        id="num-people" 
        name="num-people" 
        step="1"
        min="1"
        placeholder="0"
        required
        >
      </form>

      <div class="c-bill-splitter__results o-surface o-surface--strong o-surface--lg">
        <div class="c-bill-splitter__result">
          <p class="c-bill-splitter__result-label">
            Tip Amount
            <span class="c-bill-splitter__result-context">/ person</span>
          </p>
 
          <output id="tip-amount" class="c-bill-splitter__result-value" aria-live="polite">$0.00</output>
        </div>

        <div class="c-bill-splitter__result">
          <p class="c-bill-splitter__result-label">
            Total
            <span class="c-bill-splitter__result-context">/ person</span>
          </p>

          <output id="total" class="c-bill-splitter__result-value" aria-live="polite">$0.00</output>
        </div>

        <button class="c-bill-splitter__reset o-surface is-disabled" type="reset" form="tip-form" disabled>Reset</button>
      </div>
    </div>
  </main>
  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="https://www.frontendmentor.io/profile/VitorEmanoelNogueira" target="_blank">Vitor Nogueira</a>.
  </footer>
</body>
</html>
